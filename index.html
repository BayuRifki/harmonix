<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://sdk.scdn.co; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: file:; media-src 'self' https: data: blob: file: harmonix-media:; connect-src 'self' https: https://api.spotify.com https://accounts.spotify.com;"
    />
    <title>Harmonix</title>
    <style>
      :root {
        --bg: #0d1117;
        --bg-elevated: #161b22;
        --primary: #ec4899;
        --primary-soft: #f9a8d4;
        --accent: #f472b6;
        --text: #ffffff;
        --text-muted: #9ca3af;
        --border: #30363d;
      }
      html,
      body {
        background: var(--bg);
        color: var(--text);
      }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .splash-content {
        text-align: center;
      }
      .splash-logo {
        width: 96px;
        height: 96px;
        margin: 0 auto 16px;
        background: linear-gradient(135deg, #831843, #ec4899, #f9a8d4);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 32px rgba(236, 72, 153, 0.5);
      }
      .splash-title {
        color: #fafafa;
        font:
          600 24px/1.2 system-ui,
          -apple-system,
          sans-serif;
        letter-spacing: -0.02em;
      }
      .splash-sub {
        color: #9ca3af;
        font:
          400 13px/1.2 system-ui,
          sans-serif;
        margin-top: 6px;
      }
      .splash-spinner {
        width: 24px;
        height: 24px;
        margin: 24px auto 0;
        border: 2px solid #27272a;
        border-top-color: #f9a8d4;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-content">
        <div class="splash-logo">
          <svg width="56" height="56" viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="10" stroke="#fbcfe8" stroke-width="1.4" opacity="0.4" />
            <circle cx="16" cy="16" r="7" stroke="#fbcfe8" stroke-width="1.2" opacity="0.6" />
            <circle cx="16" cy="16" r="4" stroke="#fbcfe8" stroke-width="1" />
            <circle cx="16" cy="16" r="2" fill="#fafafa" />
            <rect x="11" y="13" width="0.8" height="6" rx="0.4" fill="#fafafa" />
            <rect x="13" y="11" width="0.8" height="10" rx="0.4" fill="#fafafa" />
            <rect x="15" y="14" width="0.8" height="4" rx="0.4" fill="#fafafa" />
            <rect x="17" y="12" width="0.8" height="8" rx="0.4" fill="#fafafa" />
            <rect x="19" y="10" width="0.8" height="12" rx="0.4" fill="#fafafa" />
            <rect x="21" y="13" width="0.8" height="6" rx="0.4" fill="#fafafa" />
          </svg>
        </div>
        <div class="splash-title">Harmonix</div>
        <div class="splash-sub">Loading your music…</div>
        <div class="splash-spinner"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
