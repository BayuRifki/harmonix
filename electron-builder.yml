appId: dev.harmonix.app
productName: Harmonix
copyright: Copyright © 2026 ${author}
asar: true
asarUnpack:
  - resources/**

publish:
  provider: github
  releaseType: release

directories:
  buildResources: resources
  output: release/${version}

extraResources:
  - from: 'resources/yt-dlp.exe'
    to: 'yt-dlp.exe'

files:
  - 'dist/**/*'
  - 'dist-electron/**/*'
  - 'package.json'
  - 'LICENSE'
  - '!**/*.{md,markdown}'
  - '!**/{.eslintrc,.prettierrc,.editorconfig,.gitignore}'

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: ${productName}-${version}-${arch}-Setup.${ext}
  icon: resources/icon.ico
  # winCodeSign (used to edit version info and sign the .exe) tries to
  # extract symlinks for darwin dylibs on Windows. Without admin or
  # Developer Mode, 7za fails with "Cannot create symbolic link" and
  # the whole build aborts. We don't ship a code-signing certificate
  # yet, so skip both signing and the rcedit step. Re-enable and add
  # certificate handling before the first public release.
  signAndEditExecutable: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Harmonix
  uninstallDisplayName: Harmonix ${version}

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  artifactName: ${productName}-${version}-${arch}.${ext}
  icon: resources/icon.png
  category: public.app-category.music
  hardenedRuntime: true
  gatekeeperAssess: false
  darkModeSupport: true

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  artifactName: ${productName}-${version}-${arch}.${ext}
  icon: resources/icon.png
  category: AudioVideo
  desktop:
    entry:
      Name: Harmonix
      Comment: Unified cross-source music player
      Categories: AudioVideo;Audio;Player;
      Keywords: music;player;spotify;youtube;
