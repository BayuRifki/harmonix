appId: dev.harmonix.app
productName: Harmonix
copyright: Copyright © 2026 ${author}
asar: true
asarUnpack:
  - resources/**

publish:
  provider: github
  releaseType: release

directories:
  buildResources: resources
  output: release/${version}

extraResources:
  - from: 'resources/yt-dlp.exe'
    to: 'yt-dlp.exe'

files:
  - 'dist/**/*'
  - 'dist-electron/**/*'
  - 'package.json'
  - 'LICENSE'
  - '!**/*.{md,markdown}'
  - '!**/{.eslintrc,.prettierrc,.editorconfig,.gitignore}'

# Hook: runs after electron-builder finishes packing the unpacked
# output dir but before the NSIS installer is built. The hook is a
# no-op on non-Windows platforms, so the same `electron-builder.yml`
# works for `dist:mac` / `dist:linux` without modification. See
# `scripts/embed-icon.cjs` for the implementation — it re-implements
# the icon-embedding half of `win.signAndEditExecutable: true` using
# the `rcedit` npm package directly, because the upstream
# `winCodeSign` 7za extractor fails on Windows (can't create darwin
# dylib symlinks without admin / Developer Mode).
afterPack: scripts/embed-icon.cjs

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: ${productName}-${version}-${arch}-Setup.${ext}
  icon: resources/icon.ico
  # winCodeSign (used to edit version info and sign the .exe) tries to
  # extract symlinks for darwin dylibs on Windows. Without admin or
  # Developer Mode, 7za fails with "Cannot create symbolic link" and
  # the whole build aborts. We don't ship a code-signing certificate
  # yet, so skip both signing and the built-in rcedit step. The
  # `afterPack` hook below re-implements just the icon-embedding half
  # by calling the `rcedit` npm package directly, so the Start Menu
  # / taskbar pinned shortcut / Explorer all show the Harmonix logo
  # instead of the broken-image placeholder Electron ships by
  # default. Re-enable `signAndEditExecutable: true` (and wire up
  # `CSC_LINK` / `CSC_KEY_PASSWORD`) once a code-signing certificate
  # is available — at that point the `afterPack` hook can be removed.
  signAndEditExecutable: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Harmonix
  uninstallDisplayName: Harmonix ${version}

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  artifactName: ${productName}-${version}-${arch}.${ext}
  icon: resources/icon.png
  category: public.app-category.music
  hardenedRuntime: true
  gatekeeperAssess: false
  darkModeSupport: true

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  artifactName: ${productName}-${version}-${arch}.${ext}
  icon: resources/icon.png
  category: AudioVideo
  desktop:
    entry:
      Name: Harmonix
      Comment: Unified cross-source music player
      Categories: AudioVideo;Audio;Player;
      Keywords: music;player;spotify;youtube;
