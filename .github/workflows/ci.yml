name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm rebuild better-sqlite3
      - run: npm run test
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Cache yt-dlp binary (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: resources/yt-dlp.exe
          key: yt-dlp-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            yt-dlp-${{ runner.os }}-
      - run: npm ci
      - run: npx @electron/rebuild -f -w better-sqlite3
      - run: npm run build
      - name: Build distributable (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run dist:linux
      - name: Build distributable (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run dist:win
      - name: Build distributable (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run dist:mac
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harmonix-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: ignore
